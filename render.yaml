services:
  - type: web
    name: beleqet-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: beleqet-db
          property: connectionString
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 30d
      - key: FRONTEND_URL
        value: "*"
      - key: OPENAI_API_KEY
        sync: false
      - key: BULL_BOARD_USERNAME
        value: admin
      - key: BULL_BOARD_PASSWORD
        value: admin

databases:
  - name: beleqet-db
    plan: free
